global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'statsd_exporter'
    static_configs:
      - targets: ['statsd-exporter:9102']

  - job_name: 'clickhouse_http'
    metrics_path: /metrics
    static_configs:
      - targets: ['clickhouse-server:8123']

  - job_name: 'fastpath_app'
    metrics_path: /metrics
    static_configs:
      - targets: ['fastpath:5000']
